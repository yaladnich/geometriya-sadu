<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Концепт: сфера з крапок · Геометрія саду</title>
<style>
  :root{--bg:#0A0B0A;--green:46,157,95;--orange:242,141,27;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:#fff;font-family:"Onest",system-ui,Arial,sans-serif;overflow:hidden;}
  .wrap{position:relative;width:100vw;height:100svh;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    background:rgba(20,22,20,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px;}
  .bar button{cursor:pointer;border:0;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.7);transition:.2s;}
  .bar button.on{background:rgba(var(--green),0.92);color:#fff;}
  .name{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(var(--green),0.95);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;text-align:center;}
  .panel{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:center;
    background:rgba(20,22,20,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;font-size:12px;}
  .panel label{display:flex;flex-direction:column;gap:4px;color:rgba(255,255,255,0.7);}
  .panel input[type=range]{accent-color:rgb(var(--green));width:120px;}
  .hint{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.4);font-size:12px;}
</style>
</head>
<body>
<div class="bar">
  <button data-m="sphere" class="on">Сфера</button>
  <button data-m="net">Вільна мережа</button>
  <button data-m="wave">Хвиля-крапки</button>
</div>
<div class="name" id="name"></div>
<div class="wrap"><canvas id="c"></canvas></div>
<div class="hint">Веди мишею — сфера повертається за курсором</div>
<div class="panel">
  <label>Вузли <input id="dens" type="range" min="60" max="400" value="200"></label>
  <label>Звʼязки <input id="dist" type="range" min="8" max="40" value="22"></label>
  <label>Швидкість <input id="spd" type="range" min="0" max="40" value="10"></label>
  <label>Оранж % <input id="org" type="range" min="0" max="35" value="12"></label>
</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const dpr=Math.min(devicePixelRatio||1,2);
  const G=[46,157,95], O=[242,141,27];
  let W=0,H=0,mode='sphere',N=200,LINK=0.22,SPD=10,ORG=0.12;
  let pts=[],edges=[],accents=[],mx=-1e4,my=-1e4,t=0,ang=0,tiltX=0.5,tTiltX=0.5,tAngV=0;

  const names={
    sphere:"Сфера — вузли на кулі, лінії між сусідами, обертання за курсором",
    net:"Вільна мережа — вузли дрейфують, павутина між близькими + до курсора",
    wave:"Хвиля-крапки — біжуча хвиля зліва направо"
  };
  function rnd(a,b){return a+Math.random()*(b-a);}

  function build(){
    pts=[]; edges=[]; accents=[];
    if(mode==='sphere'){
      // рівномірно по сфері (Фібоначчі)
      for(let i=0;i<N;i++){
        const y=1-(i/(N-1))*2, r=Math.sqrt(Math.max(0,1-y*y)), th=i*2.399963229;
        pts.push({X:Math.cos(th)*r,Y:y,Z:Math.sin(th)*r,org:Math.random()<ORG,seed:Math.random()});
      }
      // ребра: пари сусідів на сфері
      for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
        const a=pts[i],b=pts[j],dx=a.X-b.X,dy=a.Y-b.Y,dz=a.Z-b.Z;
        if(dx*dx+dy*dy+dz*dz < LINK*LINK) edges.push([i,j]);
      }
    }else if(mode==='wave'){
      for(let i=0;i<N;i++) pts.push({col:Math.random(),row:Math.random(),x:0,y:0,org:Math.random()<ORG,seed:Math.random(),r:rnd(1.1,2.2)});
    }else{
      for(let i=0;i<N;i++) pts.push({x:Math.random()*W,y:Math.random()*H,vx:rnd(-1,1),vy:rnd(-1,1),org:Math.random()<ORG,seed:Math.random(),r:rnd(1.2,2.6)});
      for(let i=0;i<14;i++) accents.push({x:Math.random()*W,y:Math.random()*H,t:(Math.random()*3)|0,s:rnd(6,14),a:Math.random()*6.28});
    }
  }
  function layout(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);build();}
  addEventListener('resize',layout);
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;
    tAngV=((mx/W)-0.5)*0.06; tTiltX=0.5+((my/H)-0.5)*1.2;});
  addEventListener('mouseleave',()=>{mx=-1e4;my=-1e4;tAngV=0;tTiltX=0.5;});

  function drawAccent(ac){ctx.strokeStyle='rgba(255,255,255,0.16)';ctx.lineWidth=1;ctx.save();ctx.translate(ac.x,ac.y);ctx.rotate(ac.a);ctx.beginPath();
    if(ac.t===0){ctx.moveTo(0,-ac.s);ctx.lineTo(ac.s*0.9,ac.s*0.7);ctx.lineTo(-ac.s*0.9,ac.s*0.7);ctx.closePath();}
    else if(ac.t===1){ctx.moveTo(-ac.s,0);ctx.lineTo(ac.s,0);ctx.moveTo(0,-ac.s);ctx.lineTo(0,ac.s);}
    else{ctx.arc(0,0,ac.s*0.6,0,6.2832);}ctx.stroke();ctx.restore();}

  function frame(){
    t+=0.016; ctx.clearRect(0,0,W,H);
    if(mode==='sphere'){
      ang += (SPD/1000*0.5) + tAngV*0.3;
      tiltX += (tTiltX-tiltX)*0.05;
      const cx=W/2,cy=H/2,R=Math.min(W,H)*0.34;
      const cosA=Math.cos(ang),sinA=Math.sin(ang),cosT=Math.cos(tiltX),sinT=Math.sin(tiltX);
      for(const p of pts){
        const x1=p.X*cosA+p.Z*sinA, z1=-p.X*sinA+p.Z*cosA, y1=p.Y;
        const y2=y1*cosT - z1*sinT, z2=y1*sinT + z1*cosT;
        const persp=2.6/(2.6 - z2);
        p.sx=cx+x1*R*persp; p.sy=cy+y2*R*persp; p.depth=(z2+1)/2; // 0 ззаду,1 спереду
      }
      // лінії
      ctx.lineWidth=1;
      for(const e of edges){const a=pts[e[0]],b=pts[e[1]];
        const dep=(a.depth+b.depth)/2, al=0.08+dep*0.45;
        const c=(a.org||b.org)?O:G;
        ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';
        ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();}
      // крапки (сортуємо по глибині — задні перші)
      const order=pts.slice().sort((a,b)=>a.depth-b.depth);
      for(const p of order){const c=p.org?O:G;const sz=(0.6+p.depth*1.9), al=0.25+p.depth*0.7;
        ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';
        ctx.beginPath();ctx.arc(p.sx,p.sy,sz,0,6.2832);ctx.fill();}
    }else if(mode==='wave'){
      const trav=t*0.25;
      for(const p of pts){const u=p.col;let n=Math.sin(u*12.566 - trav*4 + p.row*3)+0.5*Math.sin(u*25.13 - trav*6);
        p.x=u*W; p.y=H*0.5 + (p.row-0.5)*H*0.5 + n*40;}
      ctx.lineWidth=1;
      for(let i=0;i<pts.length;i++){const a=pts[i];for(let j=i+1;j<pts.length;j++){const b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
        if(d<120){const al=(1-d/120)*0.45;const c=(a.org||b.org)?O:G;ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}}
      for(const p of pts){const c=p.org?O:G;ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.8)';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.2832);ctx.fill();}
    }else{ // net
      const sp=SPD/1000;
      for(const ac of accents) drawAccent(ac);
      for(const p of pts){p.x+=p.vx*sp*60;p.y+=p.vy*sp*60;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
      ctx.lineWidth=1;
      for(let i=0;i<pts.length;i++){const a=pts[i];for(let j=i+1;j<pts.length;j++){const b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
        if(d<140){const al=(1-d/140)*0.5;const c=(a.org||b.org)?O:G;ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
        const dm=Math.hypot(a.x-mx,a.y-my);if(dm<190){const al=(1-dm/190)*0.6;ctx.strokeStyle='rgba('+G[0]+','+G[1]+','+G[2]+','+al.toFixed(3)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(mx,my);ctx.stroke();}}
      for(const p of pts){const c=p.org?O:G;ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.8)';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.2832);ctx.fill();}
    }
    requestAnimationFrame(frame);
  }
  layout(); frame(); document.getElementById('name').textContent=names[mode];
  document.querySelectorAll('.bar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    mode=b.dataset.m;document.getElementById('name').textContent=names[mode];build();}));
  const bind=(id,fn)=>{document.getElementById(id).oninput=e=>{fn(+e.target.value);build();};};
  bind('dens',v=>N=v); bind('dist',v=>LINK=v/100); bind('spd',v=>SPD=v); bind('org',v=>ORG=v/100);
})();
</script>
</body>
</html>
