<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Концепт крапки+лінії · Геометрія саду</title>
<style>
  :root{--bg:#0A0B0A;--green:46,157,95;--green-br:46,157,95;--orange:242,141,27;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:#fff;font-family:"Onest",system-ui,Arial,sans-serif;overflow:hidden;}
  .wrap{position:relative;width:100vw;height:100svh;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    background:rgba(20,22,20,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px;}
  .bar button{cursor:pointer;border:0;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.7);transition:.2s;}
  .bar button.on{background:rgba(var(--green),0.92);color:#fff;}
  .name{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(var(--green),0.95);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;text-align:center;}
  .panel{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:center;
    background:rgba(20,22,20,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;font-size:12px;}
  .panel label{display:flex;flex-direction:column;gap:4px;color:rgba(255,255,255,0.7);}
  .panel input[type=range]{accent-color:rgb(var(--green));width:120px;}
  .hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.4);font-size:12px;}
</style>
</head>
<body>
<div class="bar">
  <button data-m="ring" class="on">Сузір'я-кільце</button>
  <button data-m="net">Вільна мережа</button>
  <button data-m="wave">Хвиля-крапки</button>
  <button data-m="grow">Гілки (ріст)</button>
</div>
<div class="name" id="name"></div>
<div class="wrap"><canvas id="c"></canvas></div>
<div class="hint">Веди мишею — вузли реагують</div>
<div class="panel">
  <label>Щільність <input id="dens" type="range" min="40" max="260" value="130"></label>
  <label>Дистанція ліній <input id="dist" type="range" min="60" max="220" value="130"></label>
  <label>Швидкість <input id="spd" type="range" min="0" max="40" value="12"></label>
  <label>Оранж % <input id="org" type="range" min="0" max="40" value="12"></label>
</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const dpr=Math.min(devicePixelRatio||1,2);
  const G=[46,157,95], O=[242,141,27];
  let W=0,H=0,mode='ring',N=130,DIST=130,SPD=12,ORG=0.12;
  let pts=[],accents=[],mx=-1e4,my=-1e4,t=0;

  const names={
    ring:"Сузір'я-кільце — вузли по колу, лінії між близькими, повільне обертання",
    net:"Вільна мережа — вузли дрейфують, павутина між близькими, магніт до курсора",
    wave:"Хвиля-крапки — горизонтальні ряди, біжуча хвиля зліва направо",
    grow:"Гілки — лінії проростають від центру, як коріння/крона"
  };

  function rnd(a,b){return a+Math.random()*(b-a);}

  function build(){
    pts=[];
    const cx=W/2, cy=H/2, R=Math.min(W,H)*0.32;
    for(let i=0;i<N;i++){
      let x,y;
      if(mode==='ring'){
        const a=Math.random()*Math.PI*2, rr=R*(0.78+Math.random()*0.5);
        x=cx+Math.cos(a)*rr; y=cy+Math.sin(a)*rr*0.82;
        pts.push({x,y,bx:x,by:y,ang:a,rr,vx:0,vy:0,org:Math.random()<ORG,seed:Math.random(),r:rnd(1.2,2.6)});
      }else if(mode==='wave'){
        x=Math.random()*W; y=Math.random()*H;
        pts.push({x,y,col:Math.random(),row:Math.random(),vx:0,vy:0,org:Math.random()<ORG,seed:Math.random(),r:rnd(1.1,2.2)});
      }else{
        x=Math.random()*W; y=Math.random()*H;
        pts.push({x,y,vx:rnd(-1,1),vy:rnd(-1,1),org:Math.random()<ORG,seed:Math.random(),r:rnd(1.2,2.6)});
      }
    }
    // дрібні геом-акценти (як на референсі)
    accents=[];
    if(mode==='ring'||mode==='net'){
      for(let i=0;i<14;i++) accents.push({x:Math.random()*W,y:Math.random()*H,t:(Math.random()*3)|0,s:rnd(6,14),a:Math.random()*6.28});
    }
  }

  function layout(){
    const r=cv.getBoundingClientRect();W=r.width;H=r.height;
    cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
    build();
  }
  addEventListener('resize',layout);
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  addEventListener('mouseleave',()=>{mx=-1e4;my=-1e4;});

  function drawAccent(ac){
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    ctx.save();ctx.translate(ac.x,ac.y);ctx.rotate(ac.a);
    ctx.beginPath();
    if(ac.t===0){ // трикутник
      ctx.moveTo(0,-ac.s);ctx.lineTo(ac.s*0.9,ac.s*0.7);ctx.lineTo(-ac.s*0.9,ac.s*0.7);ctx.closePath();
    }else if(ac.t===1){ // плюс
      ctx.moveTo(-ac.s,0);ctx.lineTo(ac.s,0);ctx.moveTo(0,-ac.s);ctx.lineTo(0,ac.s);
    }else{ // коло
      ctx.arc(0,0,ac.s*0.6,0,6.2832);
    }
    ctx.stroke();ctx.restore();
  }

  function step(){
    t+=0.016;
    const sp=SPD/1000;
    for(const p of pts){
      if(mode==='ring'){
        p.ang+=sp*0.4;
        const cx=W/2, cy=H/2;
        const breath=1+Math.sin(t*0.6+p.seed*6)*0.04;
        p.bx=cx+Math.cos(p.ang)*p.rr*breath;
        p.by=cy+Math.sin(p.ang)*p.rr*0.82*breath;
        p.x+=(p.bx-p.x)*0.08; p.y+=(p.by-p.y)*0.08;
      }else if(mode==='wave'){
        const trav=t*0.25;
        const u=p.col, base=H*0.5;
        let n=Math.sin(u*6.283*2 - trav*4 + p.row*3)+0.5*Math.sin(u*6.283*4 - trav*6);
        p.x=u*W;
        p.y=base + p.row*H*0.4 - 0.45*H + n*40*Math.pow(Math.max(0,(n+1.5)/3),1.5);
      }else if(mode==='net'){
        p.x+=p.vx*sp*60; p.y+=p.vy*sp*60;
        if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
      }else if(mode==='grow'){
        // вузли тягнуться назовні від центру по спіралі
        const cx=W/2,cy=H/2;
        p.x = cx + Math.cos(p.seed*6.283 + t*0.1)* (p.seed*Math.min(W,H)*0.45);
        p.y = cy + Math.sin(p.seed*6.283 + t*0.1)* (p.seed*Math.min(W,H)*0.45);
      }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // акценти
    for(const ac of accents) drawAccent(ac);
    // лінії між близькими
    ctx.lineWidth=1;
    for(let i=0;i<pts.length;i++){
      const a=pts[i];
      for(let j=i+1;j<pts.length;j++){
        const b=pts[j], dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if(d<DIST){
          const al=(1-d/DIST)*0.5;
          const orange=a.org||b.org;
          const c=orange?O:G;
          ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
      // лінія до курсора
      const dxm=a.x-mx,dym=a.y-my,dm=Math.hypot(dxm,dym);
      if(dm<DIST*1.4){ const al=(1-dm/(DIST*1.4))*0.6;
        ctx.strokeStyle='rgba('+G[0]+','+G[1]+','+G[2]+','+al.toFixed(3)+')';
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(mx,my);ctx.stroke(); }
    }
    // крапки
    for(const p of pts){
      const c=p.org?O:G;
      const tw=0.55+0.45*Math.sin(t*2+p.seed*9);
      ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(0.5+tw*0.4).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.2832);ctx.fill();
    }
  }

  function loop(){ step(); draw(); requestAnimationFrame(loop); }
  layout(); loop();
  document.getElementById('name').textContent=names[mode];

  document.querySelectorAll('.bar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    mode=b.dataset.m;document.getElementById('name').textContent=names[mode];build();
  }));
  const bind=(id,fn)=>{document.getElementById(id).oninput=e=>{fn(+e.target.value);build();};};
  bind('dens',v=>N=v); bind('dist',v=>DIST=v); bind('spd',v=>SPD=v); bind('org',v=>ORG=v/100);
})();
</script>
</body>
</html>
