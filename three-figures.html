<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line figures — тест (Геометрія саду)</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  #label{position:fixed;left:6vw;top:8vh;color:#fff;font-size:clamp(30px,6vw,80px);font-weight:600;letter-spacing:-0.02em;pointer-events:none;}
  #label small{display:block;font-size:0.32em;font-weight:400;color:#2e9d5f;letter-spacing:0.2em;text-transform:uppercase;margin-top:0.5em;}
  .hint{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:13px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Геометрія<small id="sub">…</small></div>
<div class="hint">Світні лінії складаються у фігуру · <b style="color:#2e9d5f">Three.js + bloom</b></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const COLS = 300, ROWS = 110;     // точок × ліній
const W = 12, H = 8;              // поле зору
const AMP = 0.85;                 // наскільки лінії «вигинаються» за силуетом
const scene = new THREE.Scene();

const zeros = () => new Float32Array(ROWS * COLS);
function fieldWave() {
  const f = zeros();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    f[r * COLS + c] = 0.18 * Math.sin(c / COLS * 10 + r * 0.2);
  return f;
}
// рельєф із силуету іконки (повертає 0..1 по сітці ROWS×COLS, з розмиттям)
function fieldFromSVG(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const S = 220, cv = document.createElement('canvas'); cv.width = cv.height = S;
      const o = cv.getContext('2d');
      const sc = Math.min(S / img.width, S / img.height) * 0.82;
      o.drawImage(img, (S - img.width * sc) / 2, (S - img.height * sc) / 2, img.width * sc, img.height * sc);
      let d; try { d = o.getImageData(0, 0, S, S).data; } catch (e) { resolve(fieldWave()); return; }
      const f = zeros();
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const x = Math.min(S - 1, (c / (COLS - 1) * S) | 0);
        const y = Math.min(S - 1, (r / (ROWS - 1) * S) | 0); // r=0 верх
        f[r * COLS + c] = d[(y * S + x) * 4 + 3] > 80 ? 1 : 0;
      }
      const g = zeros();
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        let s = 0, n = 0;
        for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
          const rr = r + dr, cc = c + dc;
          if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) { s += f[rr * COLS + cc]; n++; }
        }
        g[r * COLS + c] = s / n;
      }
      resolve(g);
    };
    img.onerror = () => resolve(fieldWave());
    img.src = src;
  });
}

const lines = [];
const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
for (let r = 0; r < ROWS; r++) {
  const pos = new Float32Array(COLS * 3);
  const baseY = (0.5 - r / (ROWS - 1)) * H;   // r=0 зверху
  for (let c = 0; c < COLS; c++) { pos[c * 3] = (c / (COLS - 1) - 0.5) * W; pos[c * 3 + 1] = baseY; }
  const gg = new THREE.BufferGeometry();
  gg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const ln = new THREE.Line(gg, mat); ln.userData.baseY = baseY;
  lines.push(ln); scene.add(ln);
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 9);
camera.lookAt(0, 0, 0);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.0, 0.7, 0.0);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

const STATES = [], LABELS = [];
let cur = 0, next = 1, morph = 0, started = false;
const fA = zeros(), fB = zeros();
const ease = t => t * t * (3 - 2 * t);
const clock = new THREE.Clock();
const subEl = document.getElementById('sub');

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime(), dt = clock.getDelta();
  if (started) {
    morph += dt * 0.16;
    if (morph >= 1) { morph = 0; cur = next; next = (next + 1) % STATES.length; fA.set(STATES[cur]); fB.set(STATES[next]); }
    subEl.textContent = morph < 0.5 ? LABELS[cur] : LABELS[next];
  }
  const m = ease(morph);
  for (let r = 0; r < ROWS; r++) {
    const arr = lines[r].geometry.attributes.position.array, baseY = lines[r].userData.baseY;
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const h = fA[idx] + (fB[idx] - fA[idx]) * m;
      const ripple = 0.06 * Math.sin(c / COLS * 14 - t * 1.3 + r * 0.3);
      // силует «виштовхує» лінію вгору → лінії згущуються по контуру фігури
      arr[c * 3 + 1] = baseY + h * AMP + ripple;
      arr[c * 3 + 2] = h * 0.6; // легкий обʼєм до глядача
    }
    lines[r].geometry.attributes.position.needsUpdate = true;
  }
  composer.render();
}
animate();

(async () => {
  STATES.push(fieldWave()); LABELS.push('хвиля');
  STATES.push(await fieldFromSVG('icons/tree.svg')); LABELS.push('дерево');
  STATES.push(await fieldFromSVG('icons/sprinkler.svg')); LABELS.push('автополив');
  STATES.push(await fieldFromSVG('icons/tractor.svg')); LABELS.push('техніка');
  STATES.push(await fieldFromSVG('icons/grass.svg')); LABELS.push('газон');
  fA.set(STATES[0]); fB.set(STATES[1]); started = true;
})();
</script>
</body>
</html>
