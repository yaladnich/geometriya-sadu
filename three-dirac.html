<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dirac-style waveform → фігури — тест</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  #label{position:fixed;right:6vw;top:7vh;color:#fff;font-size:clamp(34px,7vw,96px);font-weight:600;letter-spacing:-0.02em;pointer-events:none;text-align:right;}
  #label small{display:block;font-size:0.3em;font-weight:400;color:#2e9d5f;letter-spacing:0.2em;text-transform:uppercase;margin-top:0.4em;}
  .hint{position:fixed;left:6vw;bottom:6vh;color:rgba(255,255,255,0.5);font-size:14px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Геометрія саду<small id="sub">…</small></div>
<div class="hint">Світна хвиля → силует обʼєкта · <b style="color:#2e9d5f">Three.js + bloom</b></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const COLS = 260, ROWS = 70, WIDTH = 18, DEPTH = 4.2, AMP = 2.7;
const scene = new THREE.Scene();

// профіль силуету (висота обʼєкта по кожній колонці X) із SVG-іконки
function profileFromSVG(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const S = 240, cv = document.createElement('canvas'); cv.width = cv.height = S;
      const o = cv.getContext('2d');
      const sc = Math.min(S / img.width, S / img.height) * 0.85;
      o.drawImage(img, (S - img.width * sc) / 2, (S - img.height * sc) / 2, img.width * sc, img.height * sc);
      let d; try { d = o.getImageData(0, 0, S, S).data; } catch (e) { resolve(null); return; }
      const prof = new Float32Array(COLS);
      for (let c = 0; c < COLS; c++) {
        const x = Math.min(S - 1, (c / (COLS - 1) * S) | 0);
        let top = -1;
        for (let y = 0; y < S; y++) if (d[(y * S + x) * 4 + 3] > 80) { top = y; break; }
        prof[c] = top < 0 ? 0 : (1 - top / S); // 0 — порожньо, 1 — високо
      }
      // згладити профіль
      const g = new Float32Array(COLS);
      for (let c = 0; c < COLS; c++) {
        let s = 0, n = 0;
        for (let k = -3; k <= 3; k++) { const cc = c + k; if (cc >= 0 && cc < COLS) { s += prof[cc]; n++; } }
        g[c] = s / n;
      }
      resolve(g);
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

const lines = [];
const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
for (let r = 0; r < ROWS; r++) {
  const pos = new Float32Array(COLS * 3);
  for (let c = 0; c < COLS; c++) { pos[c * 3] = (c / (COLS - 1) - 0.5) * WIDTH; pos[c * 3 + 2] = (r / (ROWS - 1) - 0.5) * DEPTH; }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const ln = new THREE.Line(g, mat); lines.push(ln); scene.add(ln);
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.35, 9.2); camera.lookAt(0, 0.25, 0);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.45, 0.85, 0.0);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

let mxn = 0;
addEventListener('pointermove', e => { mxn = (e.clientX / innerWidth - 0.5); });

// стани: профілі обʼєктів (null = чиста хвиля)
const PROFS = [], LABELS = [];
let idx = 0, reveal = 0, dir = 1, started = false; // reveal 0..1: 0 хвиля, 1 фігура
const ease = t => t * t * (3 - 2 * t);
const clock = new THREE.Clock();
const subEl = document.getElementById('sub');

function chaos(u, v, t, rOff) {
  const x = u - 0.5 - mxn * 0.15;
  const win = Math.exp(-Math.pow(x * 2.7, 2));
  const n = 0.55 * Math.sin(u * 6 + t * 1.1 + rOff) + 0.40 * Math.sin(u * 11 - t * 1.6 + rOff * 1.7)
    + 0.32 * Math.sin(u * 18 + t * 0.8 + v * 5) + 0.26 * Math.sin(u * 27 - t * 2.1 + rOff * 2.4)
    + 0.18 * Math.sin(u * 41 + t * 1.4 + v * 9);
  return win * n * AMP;
}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime(), dt = clock.getDelta();
  if (started) {
    reveal += dir * dt * 0.35;
    if (reveal >= 1) { reveal = 1; dir = -1; }                       // показали фігуру → назад
    if (reveal <= 0) { reveal = 0; dir = 1; idx = (idx + 1) % PROFS.length; } // нова фігура
    subEl.textContent = reveal > 0.4 ? LABELS[idx] : 'хвиля';
  }
  const m = ease(reveal), prof = PROFS[idx];
  for (let r = 0; r < ROWS; r++) {
    const v = r / (ROWS - 1), rOff = v * 7, arr = lines[r].geometry.attributes.position.array;
    for (let c = 0; c < COLS; c++) {
      const u = c / (COLS - 1);
      const ch = chaos(u, v, t, rOff);
      // фігура: верхня огинаюча пучка набирає профіль обʼєкта (+ дрібна брижа)
      const fig = (prof ? prof[c] : 0) * AMP * 1.15 + 0.12 * Math.sin(u * 30 - t * 1.2 + rOff);
      arr[c * 3 + 1] = ch * (1 - m) + fig * m;
    }
    lines[r].geometry.attributes.position.needsUpdate = true;
  }
  composer.render();
}
animate();

(async () => {
  PROFS.push(await profileFromSVG('icons/tree.svg')); LABELS.push('дерево');
  PROFS.push(await profileFromSVG('icons/sprinkler.svg')); LABELS.push('автополив');
  PROFS.push(await profileFromSVG('icons/tractor.svg')); LABELS.push('техніка');
  PROFS.push(await profileFromSVG('icons/grass.svg')); LABELS.push('газон');
  started = true;
})();
</script>
</body>
</html>
