<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dirac-style spectrogram waterfall — тест</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  #label{position:fixed;right:6vw;top:7vh;color:#fff;font-size:clamp(34px,7vw,96px);font-weight:600;letter-spacing:-0.02em;pointer-events:none;text-align:right;}
  .hint{position:fixed;left:6vw;bottom:6vh;color:rgba(255,255,255,0.5);font-size:14px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Геометрія<small id="sub" style="display:block;font-size:0.32em;color:#2e9d5f;letter-spacing:0.2em;text-transform:uppercase;margin-top:0.4em"></small></div>
<div class="hint">Спектрограма-водоспад (симульований звук) · <b style="color:#2e9d5f">Three.js + bloom</b></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const BINS = 90;        // частотні смуги (вісь X)
const HIST = 80;        // довжина історії в часі (вісь Z, як timeHistoryLength у Dirac)
const WIDTH = 18, DEPTH = 7.5, AMP = 3.2;
const scene = new THREE.Scene();

// ── історія спектра: HIST зрізів по BINS значень ────────────────────────
const history = [];
for (let t = 0; t < HIST; t++) history.push(new Float32Array(BINS));
const freq = new Float32Array(BINS);   // поточний «спектр»

// симульований звук: кілька генераторів-«ударів» (як у Dirac, без реальної музики)
const GENS = [
  { lo: 0.00, hi: 0.20, prob: 0.018, amp: 0.5, width: 7 },  // бас — зрідка, мʼяко
  { lo: 0.15, hi: 0.60, prob: 0.05, amp: 0.30, width: 5 },  // середина
  { lo: 0.45, hi: 1.00, prob: 0.03, amp: 0.20, width: 4 },  // верх — поодинокі
];
let phase = 0;
// режими: спокійні хвилі / гори / ліс — циклічно
const MODES = ['хвилі', 'гори', 'ліс'];
let mode = 0, modeT = 0;
const target = new Float32Array(BINS); // цільовий профіль для гір/лісу

function buildProfile() {
  if (MODES[mode] === 'гори') {
    // кілька великих хребтів (низькочастотний рельєф), що повільно дрейфують
    for (let b = 0; b < BINS; b++) {
      const u = b / (BINS - 1);
      let h = 0.55 * Math.abs(Math.sin(u * 2.3 + phase * 0.3))
            + 0.30 * Math.abs(Math.sin(u * 4.1 - phase * 0.2 + 1.0))
            + 0.16 * Math.abs(Math.sin(u * 7.0 + phase * 0.15));
      target[b] = h * Math.exp(-Math.pow((u - 0.5) * 2.0, 2)) * 1.6;
    }
  } else if (MODES[mode] === 'ліс') {
    // багато вузьких високих піків — «дерева»
    for (let b = 0; b < BINS; b++) target[b] = 0.08;
    const trees = 16;
    for (let i = 0; i < trees; i++) {
      const u = (i + 0.5) / trees + Math.sin(phase * 0.25 + i) * 0.01;
      const center = (u * BINS) | 0, height = 0.7 + 0.5 * ((Math.sin(i * 12.9) * 43758.5) % 1 + 1) % 1;
      for (let k = -2; k <= 2; k++) { const b = center + k; if (b < 0 || b >= BINS) continue; target[b] = Math.max(target[b], height * Math.exp(-(k * k) / 1.4)); }
    }
  }
}

function stepAudio() {
  phase += 0.02;
  modeT += 0.033;
  if (modeT > 7) { modeT = 0; mode = (mode + 1) % MODES.length; }

  if (MODES[mode] === 'хвилі') {
    for (let b = 0; b < BINS; b++) freq[b] *= 0.93;
    for (let b = 0; b < BINS; b++) {
      const u = b / (BINS - 1), win = Math.exp(-Math.pow((u - 0.5) * 2.4, 2));
      freq[b] += win * 0.04 * (0.6 + 0.4 * Math.sin(phase + u * 5));
    }
    for (const g of GENS) {
      if (Math.random() < g.prob) {
        const center = ((g.lo + Math.random() * (g.hi - g.lo)) * BINS) | 0;
        const a = g.amp * (0.5 + Math.random() * 0.6);
        for (let k = -g.width; k <= g.width; k++) { const b = center + k; if (b < 0 || b >= BINS) continue; freq[b] += a * Math.exp(-(k * k) / (g.width * g.width * 0.5)); }
      }
    }
  } else {
    // гори/ліс: плавно ведемо спектр до цільового профілю (рельєф пливе у глибину)
    buildProfile();
    for (let b = 0; b < BINS; b++) freq[b] += (target[b] - freq[b]) * 0.18;
  }
  // згладити по сусідах (округлі піки)
  for (let pass = 0; pass < 2; pass++) {
    for (let b = 1; b < BINS - 1; b++) freq[b] = (freq[b - 1] + freq[b] * 2 + freq[b + 1]) / 4;
  }
  // зсув історії назад у часі: новий зріз спереду
  history.pop(); history.unshift(Float32Array.from(freq));
}

// ── лінії: по одній на кожен часовий зріз (timeLines) ───────────────────
const lines = [];
const lmat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7 });
const EM = [0.18, 0.61, 0.37], OR = [0.95, 0.55, 0.11]; // ізумруд → помаранчевий
for (let t = 0; t < HIST; t++) {
  const pos = new Float32Array(BINS * 3), col = new Float32Array(BINS * 3);
  for (let b = 0; b < BINS; b++) { pos[b * 3] = (b / (BINS - 1) - 0.5) * WIDTH; pos[b * 3 + 2] = (0.5 - t / (HIST - 1)) * DEPTH; }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const ln = new THREE.Line(g, lmat); lines.push(ln); scene.add(ln);
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2.4, 9.5); camera.lookAt(0, 0.1, -1.2);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.85, 0.0);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

let acc = 0;
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  acc += clock.getDelta();
  // оновлюємо «звук» з фіксованим кроком (~30/с) — як аналізатор
  while (acc > 0.033) { stepAudio(); acc -= 0.033; }
  document.getElementById('sub').textContent = MODES[mode];
  for (let t = 0; t < HIST; t++) {
    const h = history[t], arr = lines[t].geometry.attributes.position.array, col = lines[t].geometry.attributes.color.array;
    for (let b = 0; b < BINS; b++) {
      arr[b * 3 + 1] = h[b] * AMP;
      const m = Math.min(1, h[b] * 1.2); // висота гребеня → частка помаранчевого
      col[b * 3] = EM[0] + (OR[0] - EM[0]) * m;
      col[b * 3 + 1] = EM[1] + (OR[1] - EM[1]) * m;
      col[b * 3 + 2] = EM[2] + (OR[2] - EM[2]) * m;
    }
    lines[t].geometry.attributes.position.needsUpdate = true;
    lines[t].geometry.attributes.color.needsUpdate = true;
  }
  composer.render();
}
animate();
</script>
</body>
</html>
