<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dirac-style waveform — тест</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  #label{position:fixed;right:6vw;top:7vh;color:#fff;font-size:clamp(34px,7vw,96px);font-weight:600;letter-spacing:-0.02em;pointer-events:none;}
  .hint{position:fixed;left:6vw;bottom:6vh;color:rgba(255,255,255,0.55);font-size:14px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">that.</div>
<div class="hint">How our software<br>shapes the sound</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const COLS = 260, ROWS = 70;       // точок у лінії × кількість ліній
const WIDTH = 18, DEPTH = 4.2;     // широкий і неглибокий «пучок» ліній
const scene = new THREE.Scene();

// лінії
const lines = [];
const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
for (let r = 0; r < ROWS; r++) {
  const pos = new Float32Array(COLS * 3);
  for (let c = 0; c < COLS; c++) {
    pos[c * 3] = (c / (COLS - 1) - 0.5) * WIDTH;
    pos[c * 3 + 2] = (r / (ROWS - 1) - 0.5) * DEPTH;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const ln = new THREE.Line(g, mat);
  lines.push(ln); scene.add(ln);
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.35, 9.2);
camera.lookAt(0, 0.25, 0);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.45, 0.85, 0.0);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

// миша трохи зміщує фокус піків
let mxn = 0;
addEventListener('pointermove', e => { mxn = (e.clientX / innerWidth - 0.5); });

const clock = new THREE.Clock();
const AMP = 2.7;
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  for (let r = 0; r < ROWS; r++) {
    const v = r / (ROWS - 1);
    const rOff = v * 7.0;                 // десинхронізація ліній
    const arr = lines[r].geometry.attributes.position.array;
    for (let c = 0; c < COLS; c++) {
      const u = c / (COLS - 1);
      const x = u - 0.5 - mxn * 0.15;
      // вікно: піки сконцентровані в центрі, краї плоскі
      const win = Math.exp(-Math.pow(x * 2.7, 2));
      // багатошаровий «звуковий» шум, що тече в часі
      const n =
        0.55 * Math.sin(u * 6.0 + t * 1.1 + rOff) +
        0.40 * Math.sin(u * 11.0 - t * 1.6 + rOff * 1.7) +
        0.32 * Math.sin(u * 18.0 + t * 0.8 + v * 5.0) +
        0.26 * Math.sin(u * 27.0 - t * 2.1 + rOff * 2.4) +
        0.18 * Math.sin(u * 41.0 + t * 1.4 + v * 9.0);
      arr[c * 3 + 1] = win * n * AMP;
    }
    lines[r].geometry.attributes.position.needsUpdate = true;
  }
  composer.render();
}
animate();
</script>
</body>
</html>
