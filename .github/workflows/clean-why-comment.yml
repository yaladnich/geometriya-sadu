name: Clean stale why slider comment

on:
  push:
    paths:
      - '.github/workflows/clean-why-comment.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean stale why comment
        run: |
          python3 <<'PY'
          from pathlib import Path
          text_path = Path('geometriya-sadu-VANILLA.html')
          text = text_path.read_text(encoding='utf-8')
          old = '''// #why: sticky-scroll — сфера тримається, текст-блоки прокручуються нативним скролом.
// Активний слайд визначає IntersectionObserver (центр блока перетинає центр екрана) —
// рівно один слайд за екран, без пропусків/стрибків від сили скролу.
'''
          text = text.replace(old, '', 1)
          text_path.write_text(text, encoding='utf-8')
          workflow = Path('.github/workflows/clean-why-comment.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit cleanup and self-remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geometriya-sadu-VANILLA.html .github/workflows/clean-why-comment.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Clean stale why slider comment"
          git push
