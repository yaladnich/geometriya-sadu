name: Apply why scroll slider patch

on:
  push:
    paths:
      - '.github/workflows/apply-why-scroll.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch why block
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('geometriya-sadu-VANILLA.html')
          text = path.read_text(encoding='utf-8')

          if 'scroll-slider: sphere stays in place, text blocks switch by scroll progress' not in text:
              start = text.index('.gs-why-panels{position:relative;}')
              end = text.index('.gs-why-tick{', start)
              new_css = '''.gs-why-panels{position:relative;min-height:500vh;}
          /* scroll-slider: sphere stays in place, text blocks switch by scroll progress */
          .gs-why-inner{position:sticky;top:0;z-index:1;width:var(--container-w);height:100vh;margin-inline:auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(20rem,1fr);gap:clamp(1.5rem,3vw,3rem);align-items:center;}
          .gs-why-side{will-change:transform,opacity,filter;}
          .gs-why-slides{grid-column:1;grid-row:1;position:relative;height:100%;min-width:0;}
          .gs-why-text{position:absolute;inset:0;min-height:0;display:flex;flex-direction:column;justify-content:center;max-width:34rem;opacity:0;visibility:hidden;transform:translateY(2rem);pointer-events:none;transition:opacity 0.55s var(--ease-out),transform 0.55s var(--ease-out),visibility 0s linear 0.55s;}
          .gs-why-text.is-active{opacity:1;visibility:visible;transform:translateY(0);pointer-events:auto;transition-delay:0s;}
          /* slide text reveal: lift + skew + blur, staggered */
          .gs-why-num,.gs-why-title,.gs-why-desc{opacity:0;transform:translateY(120%) skewY(6deg);transform-origin:0 bottom;}
          .gs-why-text.in .gs-why-num{animation:gsTextUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.05s;}
          .gs-why-text.in .gs-why-title{animation:gsTextUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.17s;}
          .gs-why-text.in .gs-why-desc{animation:gsTextUp 0.85s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.3s;}
          @media(prefers-reduced-motion:reduce){.gs-why-num,.gs-why-title,.gs-why-desc{opacity:1;transform:none;animation:none;}}
          .gs-why-num{font-family:var(--font-display);font-weight:800;font-size:clamp(2.5rem,4vw,3.75rem);line-height:0.9;color:var(--accent-bright);letter-spacing:-0.02em;margin-bottom:0.75rem;}
          .gs-why-title{font-family:var(--font-display);font-weight:600;font-size:clamp(1.75rem,3vw,2.75rem);line-height:1.1;margin:0 0 1rem;color:#fff;text-transform:none;}
          .gs-why-desc{margin:0;font-size:1.125rem;line-height:1.6;color:rgba(255,255,255,0.78);max-width:40ch;}
          /* sphere: fixed visual column inside the sticky why slide */
          .gs-why-dots{grid-column:2;grid-row:1;position:relative;height:100%;align-self:stretch;pointer-events:none;}
          .gs-why-dots canvas{display:block;width:100%;height:100%;background:transparent;}
          .gs-why-nav{position:absolute;left:50%;bottom:2.25rem;transform:translateX(-50%);display:flex;gap:0.5rem;z-index:3;}
          '''
              text = text[:start] + new_css + text[end:]

              start = text.index('@media(max-width:900px){', text.index('.gs-why-tick{'))
              end = text.index('\n\n.gs-pf-slider{', start)
              new_mobile = '''@media(max-width:900px){
            .gs-why-intro{padding-block:clamp(2rem,6vh,3.5rem) 0.5rem;}
            .gs-why-panels{min-height:500svh;}
            .gs-why-inner{grid-template-columns:1fr;height:100svh;align-items:center;}
            .gs-why-slides{grid-column:1;grid-row:1;z-index:1;}
            .gs-why-dots{grid-column:1;grid-row:1;z-index:0;height:100%;opacity:0.72;}
            .gs-why-text{align-items:center;text-align:center;max-width:90%;margin-inline:auto;}
            .gs-why-desc{margin-inline:auto;}
            .gs-why-nav{display:none;}
          }
          '''
              text = text[:start] + new_mobile + text[end:]

              js_start = text.index('(function initWhyPin() {')
              js_end = text.index('})();\n/* #why:', js_start) + len('})();\n')
              new_js = '''// #why: scroll-slider - sphere stays in a sticky frame, text changes by scroll progress.
          // Section height gives each text block about one viewport before the next change.
          (function initWhyPin() {
            const panels = document.querySelector('.gs-why-panels');
            const slides = Array.from(document.querySelectorAll('.gs-why-text'));
            const ticks = Array.from(document.querySelectorAll('.gs-why-tick'));
            if (!panels || !slides.length) return;

            let cur = -1;

            function activate(i) {
              const next = Math.max(0, Math.min(slides.length - 1, i));
              if (next === cur) return;
              cur = next;

              slides.forEach((slide, index) => {
                const active = index === next;
                slide.classList.toggle('is-active', active);
                if (active) slide.classList.add('in');
              });

              ticks.forEach((el, index) => el.classList.toggle('is-on', index === next));
              if (window.__whyKick) window.__whyKick();
            }

            activate(0);

            if (window.gsap && window.ScrollTrigger) {
              ScrollTrigger.create({
                trigger: panels,
                start: 'top top',
                end: 'bottom bottom',
                scrub: true,
                invalidateOnRefresh: true,
                onUpdate: self => activate(Math.floor(self.progress * slides.length))
              });
              return;
            }

            function syncWhySlide() {
              const rect = panels.getBoundingClientRect();
              const travel = Math.max(1, rect.height - window.innerHeight);
              const progress = Math.max(0, Math.min(1, -rect.top / travel));
              activate(Math.floor(progress * slides.length));
            }

            window.addEventListener('scroll', syncWhySlide, { passive: true });
            window.addEventListener('resize', syncWhySlide);
            syncWhySlide();
          })();
          '''
              text = text[:js_start] + new_js + text[js_end:]
              path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-why-scroll.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit patch and self-remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geometriya-sadu-VANILLA.html .github/workflows/apply-why-scroll.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update why block scroll slider logic"
          git push
