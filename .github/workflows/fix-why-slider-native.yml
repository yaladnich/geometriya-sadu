name: Fix why slider native scroll

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-why-slider-native.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch why slider and push
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'geometriya-sadu-VANILLA.html';
          let text = fs.readFileSync(file, 'utf8');

          const stickyMarker = '// #why: sticky-scroll';
          const scrollMarker = '// #why: scroll-slider - sphere stays in a sticky frame, text changes by scroll progress.';
          let start = text.indexOf(stickyMarker);
          if (start < 0) start = text.indexOf(scrollMarker);
          if (start < 0) throw new Error('why slider marker not found');

          const funcStart = text.indexOf('(function initWhyPin() {', start);
          const end = text.indexOf('/* #why:', funcStart);
          if (funcStart < 0 || end < 0) throw new Error('why slider function bounds not found');

          const replacement = `// #why: native scroll-slider - sticky sphere, one text slide per viewport.
(function initWhyPin() {
  const panels = document.querySelector('.gs-why-panels');
  const slides = Array.from(document.querySelectorAll('.gs-why-text'));
  const ticks = Array.from(document.querySelectorAll('.gs-why-tick'));
  if (!panels || !slides.length) return;

  let cur = -1;
  let ticking = false;

  function activate(i) {
    const next = Math.max(0, Math.min(slides.length - 1, i));
    if (next === cur) return;
    cur = next;

    slides.forEach((slide, index) => {
      const active = index === next;
      slide.classList.toggle('is-active', active);
      if (active) slide.classList.add('in');
    });

    ticks.forEach((el, index) => el.classList.toggle('is-on', index === next));
    if (window.__whyKick) window.__whyKick();
  }

  function syncWhySlide() {
    ticking = false;
    const rect = panels.getBoundingClientRect();
    const viewport = window.innerHeight || document.documentElement.clientHeight || 1;
    const travel = Math.max(1, rect.height - viewport);
    const passed = Math.max(0, Math.min(travel, -rect.top));
    const step = travel / slides.length;
    activate(Math.floor(passed / step));
  }

  function requestSync() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(syncWhySlide);
  }

  activate(0);
  requestSync();
  window.addEventListener('scroll', requestSync, { passive: true });
  window.addEventListener('resize', requestSync);
  window.addEventListener('load', requestSync);
})();
`;

          text = text.slice(0, start) + replacement + text.slice(end);
          fs.writeFileSync(file, text);
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geometriya-sadu-VANILLA.html
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No HTML changes to commit"
          else
            git commit -m "Fix why slider native scroll switching"
            git push origin HEAD:main
          fi
