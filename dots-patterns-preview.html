<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Крапки — абстрактні патерни + магніт · Геометрія саду</title>
<style>
  :root{--bg:#0a0b0a;--green:46,157,95;--orange:242,141,27;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:#fff;font-family:"Onest",system-ui,sans-serif;overflow:hidden;}
  .wrap{position:relative;width:100vw;height:100svh;display:flex;align-items:center;justify-content:center;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hint{position:relative;z-index:2;color:rgba(255,255,255,0.45);font-size:1rem;letter-spacing:0.04em;pointer-events:none;}
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:rgba(20,22,20,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px;}
  .bar button{cursor:pointer;border:0;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.7);transition:.2s;}
  .bar button.on{background:rgba(var(--green),0.9);color:#fff;}
  .name{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(var(--green),0.9);font-size:13px;letter-spacing:0.08em;text-transform:uppercase;text-align:center;}
  .panel{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;background:rgba(20,22,20,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;font-size:12px;}
  .panel label{display:flex;flex-direction:column;gap:4px;color:rgba(255,255,255,0.7);}
  .panel input{accent-color:rgb(var(--green));width:100px;}
  .panel select{background:#111;color:#fff;border:1px solid #333;border-radius:6px;padding:3px;}
</style>
</head>
<body>
<div class="bar">
  <button data-m="wave" class="on">Хвилі</button>
  <button data-m="breathe">Дихання</button>
  <button data-m="flow">Потік</button>
  <button data-m="swirl">Вир</button>
  <button data-m="rain">Дощ</button>
</div>
<div class="name" id="name">Хвилі — поле дихає синусоїдою, магніт на курсор</div>
<div class="wrap"><canvas id="c"></canvas><div class="hint">Веди мишею (магніт)</div></div>
<div class="panel">
  <label>Амплітуда <span id="vA">14</span><input id="A" type="range" min="0" max="60" value="14"></label>
  <label>Швидкість <span id="vS">10</span><input id="S" type="range" min="0" max="40" value="10"></label>
  <label>Магніт R <span id="vR">160</span><input id="R" type="range" min="0" max="320" value="160"></label>
  <label>Сила <span id="vF">30</span><input id="F" type="range" min="0" max="90" value="30"></label>
  <label>Колір<select id="col"><option value="green">Зелений</option><option value="orange">Помаранчевий</option></select></label>
</div>
<script>
(function(){
  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  const dpr=Math.min(devicePixelRatio||1,2);
  const COLS={green:[46,157,95],orange:[242,141,27]};
  let COL=COLS.green,GAP=44,mode='wave',A=14,SP=10,R=160,F=30;
  let W=0,H=0,dots=[],mx=-9999,my=-9999,t=0;

  function layout(){
    const r=canvas.getBoundingClientRect();W=r.width;H=r.height;
    canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
    const pad=Math.min(W,H)*0.05;
    const cols=Math.max(4,Math.round((W-2*pad)/GAP)+1);
    const rows=Math.max(4,Math.round((H-2*pad)/GAP)+1);
    const sx=(W-2*pad)/(cols-1),sy=(H-2*pad)/(rows-1);
    dots=[];
    for(let i=0;i<cols;i++)for(let j=0;j<rows;j++)
      dots.push({left:pad+i*sx,top:pad+j*sy,fx:pad+i*sx,fy:pad+j*sy,dx:0,dy:0,af:(Math.random()*200)|0,ai:Math.random()<0.5,seed:Math.random()*6.28});
  }
  addEventListener('resize',layout);
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  addEventListener('touchmove',e=>{const a=e.touches[0];if(a){mx=a.clientX;my=a.clientY;}},{passive:true});

  function pattern(d){
    // повертає [offsetX, offsetY] абстрактного руху
    const cx=W/2,cy=H/2;
    if(mode==='wave'){ return [Math.cos(d.top*0.012+t*1.1)*A, Math.sin(d.left*0.012+t)*A]; }
    if(mode==='breathe'){ const k=Math.sin(t)*0.10*( (Math.hypot(d.left-cx,d.top-cy))/Math.max(W,H)*2 ); return [(d.left-cx)*k,(d.top-cy)*k]; }
    if(mode==='flow'){ const ang=Math.sin(d.left*0.006+t*0.6)+Math.cos(d.top*0.006-t*0.5); return [Math.cos(ang*3.14)*A,Math.sin(ang*3.14)*A]; }
    if(mode==='swirl'){ const dx=d.left-cx,dy=d.top-cy,r=Math.hypot(dx,dy),a0=Math.atan2(dy,dx)+Math.sin(t*0.8)*0.25*(1-r/Math.max(W,H)); return [cx+Math.cos(a0)*r-d.left,cy+Math.sin(a0)*r-d.top]; }
    if(mode==='rain'){ return [Math.sin(d.seed+t*0.4)*A*0.4, ((t*40+d.seed*60)% (H) ) - (d.top) + Math.sin(t+d.seed)*4 ]; }
    return [0,0];
  }

  function tick(){
    t+=SP/1000*2;
    ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
    const cs=COL.join(',');
    for(const d of dots){
      if((d.af>=200&&d.ai)||(d.af<=0&&!d.ai))d.ai=!d.ai; d.af+=d.ai?1:-1;
      const [ox,oy]=pattern(d);
      // ціль = базова позиція + патерн
      let baseX=d.left+ (mode==='rain'?0:ox), baseY=d.top+(mode==='rain'?0:oy);
      let fx, fy;
      if(mode==='rain'){ fx=d.left+ox; fy=((d.top + t*60 + d.seed*120)%H); }
      else { fx=d.left+ox; fy=d.top+oy; }
      // магніт
      const rx=fx-mx, ry=fy-my, dist=Math.hypot(rx,ry); let near=0,tx=fx,ty=fy;
      if(dist<R){ near=1-dist/R; const dd=dist||1; tx=fx-(rx/dd)*near*F; ty=fy-(ry/dd)*near*F; }
      d.dx+=(tx-d.dx)*0.14; d.dy+=(ty-d.dy)*0.14;
      const tw=d.af/200; const a=Math.min(1,0.24+tw*0.5+near*0.55);
      ctx.fillStyle='rgba('+cs+','+a+')';
      ctx.beginPath();ctx.arc(d.dx,d.dy,1.7+near*1.6,0,6.2832);ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  layout();
  // ініціалізувати поточні позиції
  for(const d of dots){d.dx=d.left;d.dy=d.top;}
  tick();

  const names={wave:"Хвилі — поле дихає синусоїдою",breathe:"Дихання — сітка пульсує від центру",flow:"Потік — крапки пливуть полем напрямків",swirl:"Вир — м'яке закручування навколо центру",rain:"Дощ — крапки стікають донизу"};
  document.querySelectorAll('.bar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    mode=b.dataset.m;document.getElementById('name').textContent=names[mode];
  }));
  const bind=(id,fn)=>{const el=document.getElementById(id);el.oninput=()=>{fn(+el.value);document.getElementById('v'+id).textContent=el.value;};};
  bind('A',v=>A=v);bind('S',v=>SP=v);bind('R',v=>R=v);bind('F',v=>F=v);
  document.getElementById('col').onchange=e=>COL=COLS[e.target.value];
})();
</script>
</body>
</html>
