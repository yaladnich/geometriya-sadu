<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Крапки — варіанти ефекту · Геометрія саду</title>
<style>
  :root{--bg:#0a0b0a;--green:46,157,95;--orange:242,141,27;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:#fff;font-family:"Onest",system-ui,sans-serif;overflow:hidden;}
  .wrap{position:relative;width:100vw;height:100svh;display:flex;align-items:center;justify-content:center;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hint{position:relative;z-index:2;color:rgba(255,255,255,0.5);font-size:1rem;letter-spacing:0.04em;pointer-events:none;text-align:center;}
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:rgba(20,22,20,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px;}
  .bar button{cursor:pointer;border:0;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.7);transition:all .2s;}
  .bar button.on{background:rgba(var(--green),0.9);color:#fff;}
  .panel{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:18px;background:rgba(20,22,20,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;font-size:12px;}
  .panel label{display:flex;flex-direction:column;gap:4px;color:rgba(255,255,255,0.7);}
  .panel input{accent-color:rgb(var(--green));width:120px;}
  .name{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(var(--green),0.9);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="bar">
  <button data-m="net" class="on">1 · Мережа</button>
  <button data-m="repel">2 · Відштовхування</button>
  <button data-m="magnet">3 · Магніт</button>
  <button data-m="constellation">4 · Сузір'я</button>
  <button data-m="ripple">5 · Хвиля</button>
</div>
<div class="name" id="name">Мережа — лінії спалахують біля курсора</div>
<div class="wrap"><canvas id="c"></canvas><div class="hint">Веди мишею по екрану</div></div>
<div class="panel">
  <label>Радіус <span id="vR">150</span><input id="R" type="range" min="40" max="320" value="150"></label>
  <label>Сила <span id="vF">22</span><input id="F" type="range" min="0" max="80" value="22"></label>
  <label>Колір
    <select id="col" style="background:#111;color:#fff;border:1px solid #333;border-radius:6px;padding:3px;">
      <option value="green">Зелений</option><option value="orange">Помаранчевий</option>
    </select>
  </label>
</div>
<script>
(function(){
  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  const dpr=Math.min(devicePixelRatio||1,2);
  const COLS={green:[46,157,95],orange:[242,141,27]};
  let COL=COLS.green, GAP=46, mode='net', R=150, F=22;
  let W=0,H=0,cols=0,rows=0,dots=[],mx=-9999,my=-9999,ripples=[];

  function layout(){
    const r=canvas.getBoundingClientRect();W=r.width;H=r.height;
    canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
    const pad=Math.min(W,H)*0.06;
    cols=Math.max(3,Math.round((W-2*pad)/GAP)+1);
    rows=Math.max(3,Math.round((H-2*pad)/GAP)+1);
    const sx=(W-2*pad)/(cols-1),sy=(H-2*pad)/(rows-1);
    dots=[];
    for(let i=0;i<cols;i++)for(let j=0;j<rows;j++)
      dots.push({left:pad+i*sx,top:pad+j*sy,dx:0,dy:0,x:0,y:0,near:0,af:(Math.random()*200)|0,ai:Math.random()<0.5});
  }
  addEventListener('resize',layout);
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  addEventListener('click',e=>{ if(mode==='ripple') ripples.push({x:e.clientX,y:e.clientY,r:0}); });
  addEventListener('touchmove',e=>{const t=e.touches[0];if(t){mx=t.clientX;my=t.clientY;}},{passive:true});

  const idx=(i,j)=>i*rows+j;
  function tick(){
    ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
    const cs=COL.join(',');
    // позиції + взаємодія
    for(const d of dots){
      if((d.af>=200&&d.ai)||(d.af<=0&&!d.ai))d.ai=!d.ai; d.af+=d.ai?1:-1;
      const rx=d.left-mx, ry=d.top-my, dist=Math.hypot(rx,ry); let tx=0,ty=0; d.near=0;
      if(dist<R){ d.near=1-dist/R; const dd=dist||1;
        if(mode==='magnet'){ tx=-(rx/dd)*d.near*F; ty=-(ry/dd)*d.near*F; }
        else if(mode==='repel'||mode==='net'){ tx=(rx/dd)*d.near*F; ty=(ry/dd)*d.near*F; }
      }
      // хвиля
      if(mode==='ripple'){ for(const w of ripples){ const wd=Math.abs(Math.hypot(d.left-w.x,d.top-w.y)-w.r); if(wd<40){ const k=(1-wd/40); const ang=Math.atan2(d.top-w.y,d.left-w.x); tx+=Math.cos(ang)*k*F; ty+=Math.sin(ang)*k*F; d.near=Math.max(d.near,k);} } }
      d.dx+=(tx-d.dx)*0.12; d.dy+=(ty-d.dy)*0.12; d.x=d.left+d.dx; d.y=d.top+d.dy;
    }
    // лінії
    if(mode==='net'||mode==='constellation'){
      ctx.lineWidth=1;
      for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
        const a=dots[idx(i,j)];
        const draw=b=>{ let lp; if(mode==='constellation'){ const dd=Math.hypot(a.x-b.x,a.y-b.y); lp=Math.max(0,1-dd/(GAP*1.6))*0.4; } else { lp=Math.max(a.near,b.near)*0.55; } if(lp>0.02){ ctx.strokeStyle='rgba('+cs+','+lp.toFixed(3)+')'; ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke(); } };
        if(i+1<cols)draw(dots[idx(i+1,j)]); if(j+1<rows)draw(dots[idx(i,j+1)]);
      }
    }
    // крапки
    for(const d of dots){ const tw=d.af/200; const a=Math.min(1,0.26+tw*0.55+d.near*0.5);
      ctx.fillStyle='rgba('+cs+','+a+')'; ctx.beginPath(); ctx.arc(d.x,d.y,1.8+d.near*1.5,0,6.2832); ctx.fill(); }
    // оновити хвилі
    if(mode==='ripple'){ for(const w of ripples)w.r+=6; ripples=ripples.filter(w=>w.r<Math.hypot(W,H)); }
    requestAnimationFrame(tick);
  }
  layout();tick();

  const names={net:"Мережа — лінії спалахують біля курсора",repel:"Відштовхування — крапки тікають від курсора",magnet:"Магніт — крапки тягнуться до курсора",constellation:"Сузір'я — постійна павутина + мерехтіння",ripple:"Хвиля — клікни, щоб пустити коло"};
  document.querySelectorAll('.bar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    mode=b.dataset.m; document.getElementById('name').textContent=names[mode];
  }));
  const R_=document.getElementById('R'),F_=document.getElementById('F');
  R_.oninput=()=>{R=+R_.value;document.getElementById('vR').textContent=R;};
  F_.oninput=()=>{F=+F_.value;document.getElementById('vF').textContent=F;};
  document.getElementById('col').onchange=e=>{COL=COLS[e.target.value];};
})();
</script>
</body>
</html>
