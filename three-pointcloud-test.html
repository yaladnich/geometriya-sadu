<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Cloud Morph — тест (Геометрія саду)</title>
<style>
  html,body{margin:0;height:100%;background:#070a08;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);color:rgba(255,255,255,0.5);
    font-size:13px;letter-spacing:0.04em;pointer-events:none;text-align:center;}
  .hint b{color:#2e9d5f;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">Хмара точок морфиться сама · рухай мишею, щоб обертати · <b>Three.js + bloom</b></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const N = 40000;          // кількість точок
const R = 2.2;            // базовий радіус фігур
const COL_A = new THREE.Color('#2e9d5f'); // зелений (далекі/основа)
const COL_B = new THREE.Color('#F28D1B'); // фірмовий помаранчевий (ближній бік)

// ── генератори фігур: повертають [x,y,z] для індексу i з N ──────────────
const GA = Math.PI * (3 - Math.sqrt(5));
function sphere(i) {
  const y = 1 - 2 * (i + 0.5) / N, r = Math.sqrt(Math.max(0, 1 - y * y)), th = i * GA;
  return [Math.cos(th) * r * R, y * R, Math.sin(th) * r * R];
}
function torus(i) {
  const u = (i * GA) % (Math.PI * 2), v = (i * 0.0007) % (Math.PI * 2);
  const tr = R * 0.78, tu = R * 0.34;
  return [(tr + tu * Math.cos(v)) * Math.cos(u), tu * Math.sin(v), (tr + tu * Math.cos(v)) * Math.sin(u)];
}
function box(i) {
  // рівномірно по 6 гранях куба
  const s = R * 1.25, f = i % 6, a = (Math.random() - 0.5) * s, b = (Math.random() - 0.5) * s, h = s / 2;
  return [[h, a, b], [-h, a, b], [a, h, b], [a, -h, b], [a, b, h], [a, b, -h]][f];
}
function tetra(i) {
  const V = [[0, 1, 0], [0.943, -0.333, 0], [-0.471, -0.333, 0.816], [-0.471, -0.333, -0.816]].map(p => p.map(c => c * R * 1.15));
  const F = [[0, 1, 2], [0, 1, 3], [0, 2, 3], [1, 2, 3]][i % 4];
  let u = Math.random(), v = Math.random(); if (u + v > 1) { u = 1 - u; v = 1 - v; }
  const a = V[F[0]], b = V[F[1]], cc = V[F[2]];
  return [a[0] + u * (b[0] - a[0]) + v * (cc[0] - a[0]),
          a[1] + u * (b[1] - a[1]) + v * (cc[1] - a[1]),
          a[2] + u * (b[2] - a[2]) + v * (cc[2] - a[2])];
}
function helix(i) {
  const t = i / N, ang = t * Math.PI * 18, rr = R * 0.7;
  return [Math.cos(ang) * rr, (t - 0.5) * R * 2.6, Math.sin(ang) * rr];
}
const SHAPES = [sphere, torus, tetra, box, helix];

function fill(arr, fn) { for (let i = 0; i < N; i++) { const p = fn(i); arr[i * 3] = p[0]; arr[i * 3 + 1] = p[1]; arr[i * 3 + 2] = p[2]; } }

// ── геометрія: base (from) + target (to) + випадковий масштаб точки ─────
let cur = 0, next = 1;
const base = new Float32Array(N * 3), target = new Float32Array(N * 3), scale = new Float32Array(N);
fill(base, SHAPES[cur]); fill(target, SHAPES[next]);
for (let i = 0; i < N; i++) scale[i] = 0.6 + Math.random() * 0.9;

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(base, 3));
geo.setAttribute('aTarget', new THREE.BufferAttribute(target, 3));
geo.setAttribute('aScale', new THREE.BufferAttribute(scale, 1));

const mat = new THREE.ShaderMaterial({
  uniforms: {
    uMorph: { value: 0 }, uSize: { value: 14 }, uRadius: { value: R },
    uColorA: { value: COL_A }, uColorB: { value: COL_B }, uPixelRatio: { value: Math.min(devicePixelRatio, 2) }
  },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    attribute vec3 aTarget; attribute float aScale;
    uniform float uMorph, uSize, uRadius, uPixelRatio;
    varying float vMix;
    // плавний easing морфу
    float ease(float t){ return t*t*(3.0-2.0*t); }
    void main(){
      vec3 pos = mix(position, aTarget, ease(uMorph));
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vMix = clamp((mv.z + uRadius) / (2.0 * uRadius), 0.0, 1.0); // ближній бік → 1
      gl_Position = projectionMatrix * mv;
      gl_PointSize = uSize * aScale * uPixelRatio * (8.0 / -mv.z);
    }`,
  fragmentShader: /* glsl */`
    uniform vec3 uColorA, uColorB;
    varying float vMix;
    void main(){
      vec2 c = gl_PointCoord - 0.5;
      float d = dot(c, c);
      if (d > 0.25) discard;
      float alpha = smoothstep(0.25, 0.0, d);
      vec3 col = mix(uColorA, uColorB, pow(vMix, 1.5)); // далекі зелені, ближні помаранчеві
      gl_FragColor = vec4(col, alpha * (0.35 + vMix * 0.65));
    }`
});

const points = new THREE.Points(geo, mat);

// ── сцена / камера / рендер ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x070a08, 1);
const scene = new THREE.Scene();
scene.add(points);
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 6.5;

// постобробка: bloom-світіння
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.6, 0.0);
composer.addPass(bloom);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h); composer.setSize(w, h);
  camera.aspect = w / h; camera.updateProjectionMatrix();
  mat.uniforms.uPixelRatio.value = Math.min(devicePixelRatio, 2);
}
addEventListener('resize', resize); resize();

// миша — обертання (parallax)
let tmx = 0, tmy = 0, rmx = 0, rmy = 0;
addEventListener('pointermove', e => { tmx = (e.clientX / innerWidth - 0.5); tmy = (e.clientY / innerHeight - 0.5); });

// ── цикл: авто-морф по колу фігур + обертання ───────────────────────────
let morph = 0;
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  morph += dt * 0.32;            // швидкість морфу
  if (morph >= 1) {              // дійшли до target → робимо його базою, беремо наступну фігуру
    morph = 0;
    cur = next; next = (next + 1) % SHAPES.length;
    fill(base, SHAPES[cur]); fill(target, SHAPES[next]);
    geo.attributes.position.needsUpdate = true;
    geo.attributes.aTarget.needsUpdate = true;
  }
  mat.uniforms.uMorph.value = morph;

  rmx += (tmx - rmx) * 0.05; rmy += (tmy - rmy) * 0.05;
  points.rotation.y += dt * 0.25 + rmx * 0.02;
  points.rotation.x = rmy * 0.6;

  composer.render();
}
animate();
</script>
</body>
</html>
