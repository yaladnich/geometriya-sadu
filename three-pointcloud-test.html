<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Cloud Morph 3D — тест (Геометрія саду)</title>
<style>
  html,body{margin:0;height:100%;background:#070a08;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);color:rgba(255,255,255,0.5);
    font-size:13px;letter-spacing:0.04em;pointer-events:none;text-align:center;}
  .hint b{color:#2e9d5f;}
  #label{position:fixed;left:50%;top:28px;transform:translateX(-50%);color:#F28D1B;
    font-size:14px;letter-spacing:0.18em;text-transform:uppercase;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label"></div>
<div class="hint">Площина → обʼємні 3D-моделі (морф сам) · рухай мишею, щоб обертати · <b>Three.js + bloom</b></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const N = 40000;
const R = 2.4;
const COL_A = new THREE.Color('#2e9d5f');
const COL_B = new THREE.Color('#F28D1B');

// ── ВЛАСНИЙ СЕМПЛЕР: точки по поверхні набору геометрій (без addon-ів) ───
function sampleSurface(parts) {
  // зібрати всі трикутники у плоский масив позицій
  const arrs = parts.map(p => (p.index ? p.toNonIndexed() : p).attributes.position.array);
  let len = 0; arrs.forEach(a => len += a.length);
  const pos = new Float32Array(len); let off = 0; arrs.forEach(a => { pos.set(a, off); off += a.length; });

  const triN = pos.length / 9, cum = new Float32Array(triN); let total = 0;
  const A = new THREE.Vector3, B = new THREE.Vector3, C = new THREE.Vector3, ab = new THREE.Vector3, ac = new THREE.Vector3, cr = new THREE.Vector3;
  for (let t = 0; t < triN; t++) {
    const i = t * 9;
    A.set(pos[i], pos[i + 1], pos[i + 2]); B.set(pos[i + 3], pos[i + 4], pos[i + 5]); C.set(pos[i + 6], pos[i + 7], pos[i + 8]);
    ab.subVectors(B, A); ac.subVectors(C, A); cr.crossVectors(ab, ac);
    total += cr.length() * 0.5; cum[t] = total;
  }
  const a = new Float32Array(N * 3);
  let minx = 1e9, miny = 1e9, minz = 1e9, maxx = -1e9, maxy = -1e9, maxz = -1e9;
  for (let k = 0; k < N; k++) {
    const r = Math.random() * total;
    let lo = 0, hi = triN - 1; while (lo < hi) { const m = (lo + hi) >> 1; if (cum[m] < r) lo = m + 1; else hi = m; }
    const i = lo * 9;
    let u = Math.random(), v = Math.random(); if (u + v > 1) { u = 1 - u; v = 1 - v; }
    const x = pos[i] + u * (pos[i + 3] - pos[i]) + v * (pos[i + 6] - pos[i]);
    const y = pos[i + 1] + u * (pos[i + 4] - pos[i + 1]) + v * (pos[i + 7] - pos[i + 1]);
    const z = pos[i + 2] + u * (pos[i + 5] - pos[i + 2]) + v * (pos[i + 8] - pos[i + 2]);
    a[k * 3] = x; a[k * 3 + 1] = y; a[k * 3 + 2] = z;
    if (x < minx) minx = x; if (x > maxx) maxx = x; if (y < miny) miny = y; if (y > maxy) maxy = y; if (z < minz) minz = z; if (z > maxz) maxz = z;
  }
  // нормалізувати: центр у 0, масштаб під R
  const cx = (minx + maxx) / 2, cy = (miny + maxy) / 2, cz = (minz + maxz) / 2;
  const s = 2 * R / Math.max(maxx - minx, maxy - miny, maxz - minz, 0.001);
  for (let k = 0; k < N; k++) { a[k * 3] = (a[k * 3] - cx) * s; a[k * 3 + 1] = (a[k * 3 + 1] - cy) * s; a[k * 3 + 2] = (a[k * 3 + 2] - cz) * s; }
  return a;
}

// ── 3D-моделі: повертають масив частин-геометрій ────────────────────────
function treeParts() {
  const p = [];
  const trunk = new THREE.CylinderGeometry(0.12, 0.22, 1.8, 10); trunk.translate(0, -0.6, 0); p.push(trunk);
  const branch = (x, y, rot) => { const b = new THREE.CylinderGeometry(0.05, 0.09, 0.9, 8); b.rotateZ(rot); b.translate(x, y, 0); return b; };
  p.push(branch(0.28, 0.1, -0.7)); p.push(branch(-0.3, 0.25, 0.7));
  [[0, 0.9, 0, 0.95], [0.55, 0.65, 0.1, 0.55], [-0.55, 0.8, -0.1, 0.6], [0.1, 1.35, 0.2, 0.55]]
    .forEach(([x, y, z, r]) => { const f = new THREE.IcosahedronGeometry(r, 2); f.translate(x, y, z); p.push(f); });
  return p;
}
function bushParts() {
  const p = [];
  const trunk = new THREE.CylinderGeometry(0.1, 0.14, 0.5, 8); trunk.translate(0, -0.8, 0); p.push(trunk);
  const top = new THREE.SphereGeometry(0.95, 24, 18); top.scale(1, 1.25, 1); top.translate(0, 0.25, 0); p.push(top);
  return p;
}
function houseParts() {
  const p = [];
  const walls = new THREE.BoxGeometry(1.6, 1.1, 1.4); walls.translate(0, -0.35, 0); p.push(walls);
  const roof = new THREE.ConeGeometry(1.25, 0.9, 4); roof.rotateY(Math.PI / 4); roof.translate(0, 0.65, 0); p.push(roof);
  return p;
}
function makePlane() {
  const a = new Float32Array(N * 3), W = Math.round(Math.sqrt(N * 1.4)), H = Math.ceil(N / W);
  for (let i = 0; i < N; i++) {
    const col = i % W, row = (i / W) | 0;
    a[i * 3] = (col / (W - 1) - 0.5) * R * 3.4;
    a[i * 3 + 1] = (row / (H - 1) - 0.5) * R * 2.2;
    a[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
  }
  return a;
}
function makeSphere() {
  const a = new Float32Array(N * 3), GA = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - 2 * (i + 0.5) / N, rr = Math.sqrt(Math.max(0, 1 - y * y)), th = i * GA;
    a[i * 3] = Math.cos(th) * rr * R; a[i * 3 + 1] = y * R; a[i * 3 + 2] = Math.sin(th) * rr * R;
  }
  return a;
}

// ── стани ───────────────────────────────────────────────────────────────
const STATES = [], LABELS = [];
const add = (arr, l) => { STATES.push(arr); LABELS.push(l); };

let cur = 0, next = 1, morph = 0, started = false;
const base = new Float32Array(N * 3), target = new Float32Array(N * 3), scale = new Float32Array(N);
for (let i = 0; i < N; i++) scale[i] = 0.6 + Math.random() * 0.9;

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(base, 3));
geo.setAttribute('aTarget', new THREE.BufferAttribute(target, 3));
geo.setAttribute('aScale', new THREE.BufferAttribute(scale, 1));

const mat = new THREE.ShaderMaterial({
  uniforms: { uMorph: { value: 0 }, uSize: { value: 5 }, uRadius: { value: R }, uColorA: { value: COL_A }, uColorB: { value: COL_B } },
  transparent: true, depthWrite: false, blending: THREE.NormalBlending,
  vertexShader: /* glsl */`
    attribute vec3 aTarget; attribute float aScale;
    uniform float uMorph, uSize, uRadius; varying float vMix;
    float ease(float t){ return t*t*(3.0-2.0*t); }
    void main(){
      vec3 pos = mix(position, aTarget, ease(uMorph));
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vMix = clamp((mv.z + uRadius) / (2.0 * uRadius), 0.0, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = uSize * aScale * (4.0 / -mv.z);
    }`,
  fragmentShader: /* glsl */`
    uniform vec3 uColorA, uColorB; varying float vMix;
    void main(){
      vec2 c = gl_PointCoord - 0.5; float d = dot(c, c);
      if (d > 0.25) discard;
      float alpha = smoothstep(0.25, 0.0, d);
      vec3 col = mix(uColorA, uColorB, pow(vMix, 1.5));
      gl_FragColor = vec4(col, alpha * (0.45 + vMix * 0.55));
    }`
});
const points = new THREE.Points(geo, mat);

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x070a08, 1);
const scene = new THREE.Scene(); scene.add(points);
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 7;
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.4, 0.5, 0.5);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

let tmx = 0, tmy = 0, rmx = 0, rmy = 0;
addEventListener('pointermove', e => { tmx = e.clientX / innerWidth - 0.5; tmy = e.clientY / innerHeight - 0.5; });

const labelEl = document.getElementById('label');
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (started) {
    morph += dt * 0.2;
    if (morph >= 1) {
      morph = 0; cur = next; next = (next + 1) % STATES.length;
      base.set(STATES[cur]); target.set(STATES[next]);
      geo.attributes.position.needsUpdate = true; geo.attributes.aTarget.needsUpdate = true;
    }
    mat.uniforms.uMorph.value = morph;
    labelEl.textContent = morph < 0.5 ? LABELS[cur] : LABELS[next];
  }
  rmx += (tmx - rmx) * 0.05; rmy += (tmy - rmy) * 0.05;
  points.rotation.y += dt * 0.18 + rmx * 0.01;
  points.rotation.x = rmy * 0.5;
  composer.render();
}
animate();

// побудова: площину показуємо одразу, моделі — у try/catch (fallback сфера)
function safe(fn, label) { try { add(sampleSurface(fn()), label); } catch (e) { console.error('shape fail', label, e); add(makeSphere(), label); } }
add(makePlane(), 'Площина');
base.set(STATES[0]); geo.attributes.position.needsUpdate = true; // плоска сітка видима одразу
safe(treeParts, 'Дерево');
safe(bushParts, 'Самшит');
safe(houseParts, 'Будинок');
add(makeSphere(), 'Сфера');
target.set(STATES[1]); geo.attributes.aTarget.needsUpdate = true;
started = true;
</script>
</body>
</html>
