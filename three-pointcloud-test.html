<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Cloud Morph — тест (Геометрія саду)</title>
<style>
  html,body{margin:0;height:100%;background:#070a08;overflow:hidden;font-family:system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);color:rgba(255,255,255,0.5);
    font-size:13px;letter-spacing:0.04em;pointer-events:none;text-align:center;}
  .hint b{color:#2e9d5f;}
  #label{position:fixed;left:50%;top:28px;transform:translateX(-50%);color:#F28D1B;
    font-size:14px;letter-spacing:0.18em;text-transform:uppercase;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label"></div>
<div class="hint">Площина → фігура (морф сам) · рухай мишею, щоб обертати · <b>Three.js + bloom</b></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const N = 38000;          // кількість точок
const R = 2.2;            // базовий масштаб фігур
const COL_A = new THREE.Color('#2e9d5f'); // зелений
const COL_B = new THREE.Color('#F28D1B'); // фірмовий помаранчевий

// ── ПЛОЩИНА: рівна сітка точок (стан спокою) ───────────────────────────
function makePlane() {
  const a = new Float32Array(N * 3), W = Math.round(Math.sqrt(N * 1.4)), H = Math.ceil(N / W);
  for (let i = 0; i < N; i++) {
    const col = i % W, row = (i / W) | 0;
    a[i * 3] = (col / (W - 1) - 0.5) * R * 3.4;
    a[i * 3 + 1] = (row / (H - 1) - 0.5) * R * 2.2;
    a[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
  }
  return a;
}

// ── САМШИТ: куля-крона на стовбурі (процедурно) ────────────────────────
function makeBoxwood() {
  const a = new Float32Array(N * 3), GA = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    if (i % 5 === 0) { // стовбур (20%)
      a[i * 3] = (Math.random() - 0.5) * R * 0.18;
      a[i * 3 + 1] = -R * 0.6 + Math.random() * R * 0.5;
      a[i * 3 + 2] = (Math.random() - 0.5) * R * 0.18;
    } else {           // крона — заповнена куля з легким шумом
      const y = 1 - 2 * (i + 0.5) / N, rr = Math.sqrt(Math.max(0, 1 - y * y)), th = i * GA;
      const rad = R * 0.72 * (0.82 + Math.random() * 0.18);
      a[i * 3] = Math.cos(th) * rr * rad;
      a[i * 3 + 1] = y * rad + R * 0.35;
      a[i * 3 + 2] = Math.sin(th) * rr * rad;
    }
  }
  return a;
}

// ── СФЕРА (для порівняння) ─────────────────────────────────────────────
function makeSphere() {
  const a = new Float32Array(N * 3), GA = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - 2 * (i + 0.5) / N, rr = Math.sqrt(Math.max(0, 1 - y * y)), th = i * GA;
    a[i * 3] = Math.cos(th) * rr * R; a[i * 3 + 1] = y * R; a[i * 3 + 2] = Math.sin(th) * rr * R;
  }
  return a;
}

// ── СЕМПЛ ІЗ SVG-ІКОНКИ: пікселі силуету → точки (з легким обʼємом по Z) ─
function sampleSVG(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const S = 360, cv = document.createElement('canvas'); cv.width = cv.height = S;
      const o = cv.getContext('2d');
      const sc = Math.min(S / img.width, S / img.height) * 0.9;
      const dw = img.width * sc, dh = img.height * sc;
      o.drawImage(img, (S - dw) / 2, (S - dh) / 2, dw, dh);
      let data; try { data = o.getImageData(0, 0, S, S).data; } catch (e) { resolve(makeSphere()); return; }
      const cand = [];
      for (let y = 0; y < S; y++) for (let x = 0; x < S; x++)
        if (data[(y * S + x) * 4 + 3] > 80) cand.push([(x / S - 0.5) * R * 2.6, -(y / S - 0.5) * R * 2.6]);
      if (!cand.length) { resolve(makeSphere()); return; }
      const a = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const c = cand[(Math.random() * cand.length) | 0];
        a[i * 3] = c[0] + (Math.random() - 0.5) * 0.04;
        a[i * 3 + 1] = c[1] + (Math.random() - 0.5) * 0.04;
        a[i * 3 + 2] = (Math.random() - 0.5) * R * 0.25; // тонкий обʼєм
      }
      resolve(a);
    };
    img.onerror = () => resolve(makeSphere());
    img.src = src;
  });
}

// ── зібрати всі стани ──────────────────────────────────────────────────
const STATES = [], LABELS = [];
function addState(arr, label) { STATES.push(arr); LABELS.push(label); }

let cur = 0, next = 1, morph = 0, started = false;
const base = new Float32Array(N * 3), target = new Float32Array(N * 3), scale = new Float32Array(N);
for (let i = 0; i < N; i++) scale[i] = 0.6 + Math.random() * 0.9;

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(base, 3));
geo.setAttribute('aTarget', new THREE.BufferAttribute(target, 3));
geo.setAttribute('aScale', new THREE.BufferAttribute(scale, 1));

const mat = new THREE.ShaderMaterial({
  uniforms: {
    uMorph: { value: 0 }, uSize: { value: 5 }, uRadius: { value: R },
    uColorA: { value: COL_A }, uColorB: { value: COL_B }
  },
  transparent: true, depthWrite: false, blending: THREE.NormalBlending,
  vertexShader: /* glsl */`
    attribute vec3 aTarget; attribute float aScale;
    uniform float uMorph, uSize, uRadius;
    varying float vMix;
    float ease(float t){ return t*t*(3.0-2.0*t); }
    void main(){
      vec3 pos = mix(position, aTarget, ease(uMorph));
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vMix = clamp((mv.z + uRadius) / (2.0 * uRadius), 0.0, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = uSize * aScale * (4.0 / -mv.z);
    }`,
  fragmentShader: /* glsl */`
    uniform vec3 uColorA, uColorB;
    varying float vMix;
    void main(){
      vec2 c = gl_PointCoord - 0.5;
      float d = dot(c, c);
      if (d > 0.25) discard;
      float alpha = smoothstep(0.25, 0.0, d);
      vec3 col = mix(uColorA, uColorB, pow(vMix, 1.5));
      gl_FragColor = vec4(col, alpha * (0.45 + vMix * 0.55));
    }`
});
const points = new THREE.Points(geo, mat);

// ── сцена ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x070a08, 1);
const scene = new THREE.Scene(); scene.add(points);
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 6.5;
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.35, 0.5, 0.55);
composer.addPass(bloom);
function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

let tmx = 0, tmy = 0, rmx = 0, rmy = 0;
addEventListener('pointermove', e => { tmx = e.clientX / innerWidth - 0.5; tmy = e.clientY / innerHeight - 0.5; });

const labelEl = document.getElementById('label');
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (started) {
    morph += dt * 0.22;
    if (morph >= 1) {
      morph = 0; cur = next; next = (next + 1) % STATES.length;
      base.set(STATES[cur]); target.set(STATES[next]);
      geo.attributes.position.needsUpdate = true; geo.attributes.aTarget.needsUpdate = true;
    }
    mat.uniforms.uMorph.value = morph;
    labelEl.textContent = morph < 0.5 ? LABELS[cur] : LABELS[next];
  }
  rmx += (tmx - rmx) * 0.05; rmy += (tmy - rmy) * 0.05;
  points.rotation.y = rmx * 0.8 + Math.sin(clock.elapsedTime * 0.25) * 0.25;
  points.rotation.x = rmy * 0.5;
  composer.render();
}
animate();

// ── завантаження станів (площина + іконки + самшит + сфера) ─────────────
(async () => {
  addState(makePlane(), 'Площина');
  addState(await sampleSVG('icons/tree.svg'), 'Дерево');
  addState(makeBoxwood(), 'Самшит');
  addState(await sampleSVG('icons/grass.svg'), 'Газон');
  addState(await sampleSVG('icons/sprinkler.svg'), 'Автополив');
  addState(await sampleSVG('icons/tractor.svg'), 'Спецтехніка');
  addState(makeSphere(), 'Сфера');
  base.set(STATES[0]); target.set(STATES[1]);
  geo.attributes.position.needsUpdate = true; geo.attributes.aTarget.needsUpdate = true;
  started = true;
})();
</script>
</body>
</html>
